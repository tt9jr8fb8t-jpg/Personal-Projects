<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gnos</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="/book.svg" type="image/svg+xml">
</head>
<body>
  <div id="library-view" class="view active">
    <header class="app-header">
      <span class="logo">Gnos</span>
      <div class="header-center">
        <div class="search-bar-wrapper">
          <div class="search-bar">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.5"/><line x1="9.8" y1="9.8" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <input type="text" id="library-search" placeholder="Search books, authors...">
            <span class="search-shortcut">⌘K</span>
          </div>
          <div id="search-results-dropdown" class="search-results-dropdown hidden"></div>
        </div>
        <button id="btn-add-book" class="btn-add-square" title="Add Book">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1.5" x2="7" y2="12.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1.5" y1="7" x2="12.5" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="header-right-actions">
        <button id="btn-profile" class="btn-icon-round" title="Profile">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 13c0-2.485 2.462-4.5 5.5-4.5s5.5 2.015 5.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button id="btn-settings" class="btn-icon-round" title="Settings">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.4"/><path d="M8 1.5v1.2M8 13.3v1.2M1.5 8h1.2M13.3 8h1.2M3.4 3.4l.85.85M11.75 11.75l.85.85M12.6 3.4l-.85.85M4.25 11.75l-.85.85" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>
    <main class="library-main">
      <div id="loading-state" class="hidden">Loading…</div>
      <div id="library-content">
        <div class="library-tabs-row">
          <button class="lib-tab active" data-libtab="books">Library</button>
          <button class="lib-tab" data-libtab="audiobooks">Audiobooks</button>
          <button class="lib-tab" data-libtab="notebooks">Notebooks</button>
        </div>
        <div id="tab-books" class="lib-tab-panel active">
          <div id="library-header-text" class="library-header-text hidden">
            <h1>Library</h1>
            <span id="library-count"></span>
          </div>
          <div id="library-grid" class="library-grid"></div>
          <p id="empty-state" class="empty-state hidden">Your library is empty.<br/><span>Supports .txt · .md · .epub</span></p>
        </div>
        <div id="tab-audiobooks" class="lib-tab-panel hidden">
          <div id="audiobook-header-text" class="library-header-text">
            <h1>Audiobooks</h1>
            <span id="audiobook-count"></span>
          </div>
          <div id="audiobook-grid" class="library-grid"></div>
          <p id="audiobook-empty-state" class="empty-state hidden">No audiobooks downloaded.<br/><span>Supports .mp3 · .m4b · .wav · .ogg · .flac</span></p>
        </div>
      </div>
      <div id="tab-notebooks" class="lib-tab-panel hidden">
        <div id="notebook-grid" class="library-grid"></div>
        <p id="notebook-empty-state" class="empty-state hidden">No notebooks yet.<br/><span>Click + to create your first notebook.</span></p>
      </div>
    </main>
    <div class="library-footer">
      <div class="streak-section">
        <span class="streak-label">Reading Streak</span>
        <div class="streak-dots" id="streak-dots"></div>
        <span class="streak-count" id="streak-count-label">0 day streak</span>
      </div>
    </div>
  </div>

  <div id="reader-view" class="view">
    <header class="reader-header">
      <button id="btn-exit-reader" class="btn-icon text-logo">Gnos</button>
      
      <div class="chapter-nav-wrapper">
        <button id="btn-chapter-drop" class="btn-chapter">
          <div class="title-row">
            <span id="reader-book-title">Title</span>
            <svg id="chapter-chev" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div id="reader-chapter-title" class="sub-row">Chapter</div>
        </button>
        <div id="chapter-dropdown" class="dropdown hidden">
          <div class="dropdown-header">
            <div id="drop-book-title" class="drop-title"></div>
            <div id="drop-book-stats" class="drop-stats"></div>
            <input type="text" id="chapter-search" placeholder="Search chapters..." class="chapter-search-input">
          </div>
          <div id="chapter-list"></div>
        </div>
      </div>

      <div class="reader-actions">
        <button id="btn-reader-notes" class="btn-reader-icon" title="View notes">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2h12v10H8l-4 3V2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-toggle-audio" class="btn-reader-icon hidden" title="Play audiobook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M3 9h4l5-6v18l-5-6H3V9z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M16 8.5c1.333 1.167 2 2.5 2 3.5s-.667 2.333-2 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M19 6c2 1.833 3 3.833 3 6s-1 4.167-3 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-upload-audio" class="btn-reader-icon" title="Upload audiobook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M9 19c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2v-1c0-1.1.9-2 2-2h2c1.1 0 2 .9 2 2v1zM21 16c0 1.1-.9 2-2 2h-2c-1.1 0-2-.9-2-2v-1c0-1.1.9-2 2-2h2c1.1 0 2 .9 2 2v1z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M9 20V8l12-3v11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="btn-reader-settings" class="btn-reader-icon" title="Reader settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.4"/><path d="M8 1.5v1.2M8 13.3v1.2M1.5 8h1.2M13.3 8h1.2M3.4 3.4l.85.85M11.75 11.75l.85.85M12.6 3.4l-.85.85M4.25 11.75l-.85.85" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <div id="reader-settings-panel" class="settings-panel hidden"></div>

    <div id="tap-zone-prev" class="tap-zone left hidden"><div class="tap-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>
    <div id="tap-zone-next" class="tap-zone right hidden"><div class="tap-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>

    <main class="reader-main">
      <div id="reader-card" class="reader-card"></div>
    </main>

    <footer class="reader-footer">
      <div class="footer-nav">
        <button id="btn-prev-page" class="btn outline">← Prev</button>
        <span id="page-indicator" class="page-indicator">Page 1</span>
        <button id="btn-next-page" class="btn outline">Next →</button>
      </div>
      <div class="progress-track">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </footer>
  </div>

  <!-- Notebook editor view -->
  <div id="notebook-view" class="view">
    <header class="reader-header">
      <button id="btn-exit-notebook" class="btn-icon text-logo">Gnos</button>
      <div class="notebook-title-wrap">
        <input id="notebook-title-input" class="notebook-title-input" placeholder="Untitled" spellcheck="false">
      </div>
      <div class="reader-actions">
        <span id="notebook-save-status" class="notebook-save-status">Saved</span>
        <button id="btn-notebook-mode" class="btn-reader-icon" title="Focus mode (hide editor)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h4M2 8h12M2 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button id="btn-notebook-delete" class="btn-reader-icon" title="Delete notebook">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M6 4V2h4v2M5 4l1 9h4l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>
    <div class="notebook-toolbar" id="notebook-toolbar">
      <button class="nb-tool-btn" data-action="h1" title="Heading 1">H1</button>
      <button class="nb-tool-btn" data-action="h2" title="Heading 2">H2</button>
      <button class="nb-tool-btn nb-tool-sep" data-action="bold" title="Bold"><strong>B</strong></button>
      <button class="nb-tool-btn" data-action="italic" title="Italic"><em>I</em></button>
      <button class="nb-tool-btn" data-action="code" title="Inline code"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M5 4l-4 4 4 4M11 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="nb-tool-btn nb-tool-sep" data-action="ul" title="Bullet list"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><line x1="6" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="3" cy="4" r="1" fill="currentColor"/><circle cx="3" cy="8" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/></svg></button>
      <button class="nb-tool-btn" data-action="hr" title="Divider">—</button>
      <button class="nb-tool-btn" data-action="link" title="Link">🔗</button>
      <button class="nb-tool-btn nb-tool-sep" data-action="wiki" title="Link to note or book">[[]]</button>
    </div>
    <div class="notebook-panes" id="notebook-panes">
      <textarea id="notebook-textarea" class="notebook-textarea" placeholder="Start writing in Markdown…" spellcheck="true"></textarea>
      <div id="notebook-preview" class="notebook-preview"></div>
    </div>
  </div>

  <!-- Add choice popup -->
  <div id="add-choice-popup" class="add-choice-popup hidden">
    <button class="add-choice-btn" id="choice-add-book">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.6"/><line x1="7" y1="8" x2="17" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="7" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="7" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span>Import Book</span>
      <small>.epub · .txt · .md · .pdf</small>
    </button>
    <button class="add-choice-btn" id="choice-new-notebook">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 4h16v16H4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><line x1="8" y1="4" x2="8" y2="20" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="12" y1="9" x2="18" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="12" y1="13" x2="18" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span>New Notebook</span>
      <small>Markdown · live preview</small>
    </button>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-content" id="settings-modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="btn-close-settings" class="btn-close">×</button>
      </div>
      <div class="modal-tabs">
        <button class="tab active" data-tab="theme">Appearance</button>
        <button class="tab" data-tab="library">Library</button>
        <button class="tab" data-tab="accessibility">Accessibility</button>
        <button class="tab" data-tab="ai">AI</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-content profile-modal-content">
      <div class="modal-header">
        <h2>Reading Profile</h2>
        <button id="btn-close-profile" class="btn-close">×</button>
      </div>
      <div id="profile-body"></div>
    </div>
  </div>

  <div id="upload-toast" class="toast hidden">
    <div class="spinner" id="upload-spinner"></div>
    <span id="upload-toast-text">Processing…</span>
  </div>

  <input type="file" id="file-input" accept=".txt,.md,.epub,.epub3,.pdf" multiple class="hidden-input">
  <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden-input">
  <input type="file" id="audio-input" accept="audio/*" class="hidden-input">
  <input type="file" id="theme-input" accept=".json" class="hidden-input">
  <input type="file" id="lib-import-input" accept=".json" class="hidden-input">
  <audio id="audio-player" class="hidden-input"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
